<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人格宇宙 - MBTI探索与疗愈</title>
    <link rel="stylesheet" href="css/mbtiPersonality.css">
</head>
<body>
    <canvas id="mbti-canvas"></canvas>
    <div class="cursor-glow" id="cursor-glow"></div>
    
    <div class="ui-layer" id="ui-layer">
        <!-- 首页 -->
        <section class="page active" id="page-welcome">
            <div class="welcome-content">
                <h1 class="cosmic-title">人格宇宙</h1>
                <p class="cosmic-subtitle">探索内心人格的宇宙空间</p>
                <div class="welcome-orbs">
                    <div class="orb orb-1"></div>
                    <div class="orb orb-2"></div>
                    <div class="orb orb-3"></div>
                </div>
                <button class="cosmic-btn" id="btn-start-journey">
                    <span class="btn-text">开启人格探索之旅</span>
                    <span class="btn-glow"></span>
                </button>
                <p class="welcome-hint">16种人格，16个宇宙</p>
            </div>
        </section>

        <!-- 测试页 -->
        <section class="page" id="page-test">
            <div class="test-container">
                <div class="test-header">
                    <div class="progress-ring">
                        <svg viewBox="0 0 100 100">
                            <circle class="progress-bg" cx="50" cy="50" r="45" />
                            <circle class="progress-fill" cx="50" cy="50" r="45" id="test-progress" />
                        </svg>
                        <span class="progress-text" id="progress-text">1/28</span>
                    </div>
                    <div class="dimension-indicator" id="dimension-indicator">
                        <span class="dim-label">外向</span>
                        <div class="dim-bar">
                            <div class="dim-fill" id="dim-fill"></div>
                        </div>
                        <span class="dim-label">内向</span>
                    </div>
                </div>
                
                <div class="question-area">
                    <div class="question-card" id="question-card">
                        <p class="question-text" id="question-text"></p>
                        <div class="options-container" id="options-container"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 分析页 -->
        <section class="page" id="page-analysis">
            <div class="analysis-container">
                <div class="analysis-header">
                    <h2 class="analysis-title">宇宙正在解读你的人格...</h2>
                    <div class="analysis-animation" id="analysis-animation">
                        <div class="orbit-ring">
                            <div class="orbit-dot"></div>
                        </div>
                        <div class="orbit-ring orbit-ring-2">
                            <div class="orbit-dot"></div>
                        </div>
                        <div class="orbit-ring orbit-ring-3">
                            <div class="orbit-dot"></div>
                        </div>
                    </div>
                </div>
                
                <div class="analysis-content" id="analysis-content">
                    <div class="personality-reveal" id="personality-reveal">
                        <div class="type-badge" id="type-badge"></div>
                        <h3 class="type-name" id="type-name"></h3>
                        <p class="type-title" id="type-title"></p>
                        <div class="type-description" id="type-description"></div>
                    </div>
                    
                    <div class="dimensions-display" id="dimensions-display">
                        <div class="dimension-bar" data-dimension="EI">
                            <span class="dim-name">外向 (E)</span>
                            <div class="dim-track">
                                <div class="dim-progress" id="dim-EI"></div>
                            </div>
                            <span class="dim-name">内向 (I)</span>
                        </div>
                        <div class="dimension-bar" data-dimension="SN">
                            <span class="dim-name">感觉 (S)</span>
                            <div class="dim-track">
                                <div class="dim-progress" id="dim-SN"></div>
                            </div>
                            <span class="dim-name">直觉 (N)</span>
                        </div>
                        <div class="dimension-bar" data-dimension="TF">
                            <span class="dim-name">思考 (T)</span>
                            <div class="dim-track">
                                <div class="dim-progress" id="dim-TF"></div>
                            </div>
                            <span class="dim-name">情感 (F)</span>
                        </div>
                        <div class="dimension-bar" data-dimension="JP">
                            <span class="dim-name">判断 (J)</span>
                            <div class="dim-track">
                                <div class="dim-progress" id="dim-JP"></div>
                            </div>
                            <span class="dim-name">知觉 (P)</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 疗愈页 -->
        <section class="page" id="page-healing">
            <div class="healing-container">
                <div class="healing-header">
                    <h2 class="healing-title">人格专属疗愈空间</h2>
                    <p class="healing-subtitle" id="healing-subtitle"></p>
                </div>
                
                <div class="healing-options">
                    <div class="healing-card" data-mode="emotion">
                        <div class="healing-icon">🌙</div>
                        <h3>情绪疗愈</h3>
                        <p>识别并安抚你的情绪</p>
                    </div>
                    <div class="healing-card" data-mode="meditation">
                        <div class="healing-icon">🧘</div>
                        <h3>人格冥想</h3>
                        <p>定制你的冥想体验</p>
                    </div>
                    <div class="healing-card" data-mode="companion">
                        <div class="healing-icon">✨</div>
                        <h3>AI陪伴</h3>
                        <p>懂你的陪伴者</p>
                    </div>
                    <div class="healing-card" data-mode="breathing">
                        <div class="healing-icon">🌬️</div>
                        <h3>呼吸练习</h3>
                        <p>跟随节奏放松</p>
                    </div>
                </div>
                
                <div class="healing-content-area" id="healing-content-area">
                    <div class="healing-chat" id="healing-chat"></div>
                    <div class="healing-input-area" id="healing-input-area" style="display: none;">
                        <input type="text" id="healing-input" placeholder="说说你的感受..." maxlength="200">
                        <button class="send-btn" id="healing-send">✦</button>
                    </div>
                </div>
                
                <button class="cosmic-btn back-btn" id="btn-back-healing">
                    <span class="btn-text">返回</span>
                </button>
            </div>
        </section>
    </div>

    <script src="js/mbtiParticles.js"></script>
    <script src="js/mbtiTest.js"></script>
    <script src="js/mbtiAnalysis.js"></script>
    <script src="js/mbtiHealing.js"></script>
    <script src="js/mbtiMain.js"></script>
</body>
</html>
